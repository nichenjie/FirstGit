<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新城控股 vs 新城发展 - 金融数据分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 新城控股 vs 新城发展</h1>
            <div class="header-controls">
                <button id="refresh-btn">🔄 刷新数据</button>
            </div>
        </header>

        <main class="content">
            <div class="main-layout">
                <div class="left-column">
                    <div class="chart-container">
                        <h3>收盘价走势对比</h3>
                        <div id="price-chart" class="chart"></div>
                    </div>

                    <div class="data-table-container">
                        <h3>数据详情（按统计周期显示）</h3>
                        <table id="data-table" class="data-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>新城控股收盘价(CNY)</th>
                                    <th>新城控股市值(亿)</th>
                                    <th>新城发展收盘价(HKD)</th>
                                    <th>新城发展市值(亿HKD)</th>
                                    <th>汇率(HKD/CNY)</th>
                                    <th>新城发展人民币市值(亿)</th>
                                    <th>市值比(发展/控制)</th>
                                    <th>市值比百分位</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="signal-panel" id="signal-panel">
                    <h3>📊 交易信号 (<span id="low-threshold-val">10</span>% 买入发展 ~ <span id="high-threshold-val">90</span>% 卖出发展)</h3>
                    <div class="signal-controls">
                        <label>统计周期:
                            <select id="percentile-period">
                                <option value="1">近1年</option>
                                <option value="2">近2年</option>
                                <option value="3" selected>近3年</option>
                                <option value="5">近5年</option>
                            </select>
                        </label>
                        <label>低于 <input type="number" id="low-threshold" value="10" min="1" max="50" step="1">%</label>
                        <label>高于 <input type="number" id="high-threshold" value="90" min="50" max="99" step="1">%</label>
                        <button id="update-signals-btn">更新区间</button>
                        <button id="smart-analysis-btn">🤖 智能策略分析</button>
                    </div>
                    <div id="smart-analysis-result" class="smart-result"></div>
                    <div class="signal-content">
                        <div class="signal-item combined">
                            <span class="signal-dates" id="signal-dates">-</span>
                        </div>
                    </div>
                    <div class="signal-returns" id="signal-returns">
                        <h4>交易区间收益分析</h4>
                        <div id="signal-returns-content">-</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/charts.js"></script>
    <script src="data/embedded_data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
